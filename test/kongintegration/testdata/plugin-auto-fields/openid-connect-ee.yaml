---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: default
  labels:
    app: httpbin
spec:
  ports:
  - name: http
    port: 80
    targetPort: 80
  selector:
    app: httpbin
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: httpbin
  namespace: default
  annotations:
    konghq.com/plugins: openid-connect-auto-field
spec:
  ingressClassName: kong
  rules:
  - http:
      paths:
      - path: /httpbin
        pathType: ImplementationSpecific
        backend:
          service:
            name: httpbin
            port:
              number: 80
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: openid-connect-auto-field
  namespace: default
plugin: openid-connect
config:
  issuer: https://issuer.example.com
  client_id:
  - test-client
  client_secret:
  - test-secret
  client_auth:
  - client_secret_post
  auth_methods:
  - bearer
  bearer_token_param_type:
  - query