---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: default
  labels:
    app: httpbin
spec:
  ports:
  - name: http
    port: 80
    targetPort: 80
  selector:
    app: httpbin
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: httpbin
  namespace: default
  annotations:
    konghq.com/plugins: key-auth-auto-field
spec:
  ingressClassName: kong
  rules:
  - http:
      paths:
      - path: /httpbin
        pathType: ImplementationSpecific
        backend:
          service:
            name: httpbin
            port:
              number: 80
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: key-auth-auto-field
  namespace: default
plugin: key-auth
config: {}
---
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: consumer
  namespace: default
  annotations:
    kubernetes.io/ingress.class: kong
username: consumer
credentials:
  - consumer-key-auth
---
apiVersion: v1
kind: Secret
metadata:
  name: consumer-key-auth
  namespace: default
  labels:
    konghq.com/credential: key-auth
data: {}